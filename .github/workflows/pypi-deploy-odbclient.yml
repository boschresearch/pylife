name: Build odbclient and upload to PyPI

on:
  workflow_dispatch:
  release:
    types: [published]

  push:
    branches: [ci-debug]

  pull_request:
    branches:
      - master
      - develop


defaults:
  run:
    working-directory: tools/odbclient

jobs:
  build:
    name: Build wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        name: Install uv

      - name: Build sdist
        run: uv build --sdist

      - name: Build wheel
        run: uv build --wheel

      - uses: actions/upload-artifact@v7
        with:
          name: artifact-sdist-wheel
          path: tools/odbclient/dist/

  upload_pypi:
    needs: [build]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      # IMPORTANT: this permission is mandatory for Trusted Publishing
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: artifact-sdist-wheel
          path: dist

      - name: Publish package distributions to PyPI
        if: github.event_name == 'release' && github.event.action == 'published'
        uses: pypa/gh-action-pypi-publish@release/v1

      # - name: Publish package distributions to PyPI test
      #   if: github.event_name != 'release'
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     verbose: true
      #     repository-url: https://test.pypi.org/legacy/
