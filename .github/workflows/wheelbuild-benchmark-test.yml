name: Build wheels and perform benchmarks

on:
  pull_request:
    branches: [develop, master]
  push:
    branches: [ci-debug]


jobs:
  build_wheels:
    name: Build wheels on for various systems
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        name: Install uv

      - name: Build wheels
        run: uv build --wheel

      - uses: actions/upload-artifact@v7
        with:
          name: wheel
          path: dist/

  benchmark:
    name: Benchmark tests
    needs: [build_wheels]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v7
        with:
          name: wheel
          path: dist/
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          activate-environment: "true"
      - name: Install wheel
        run: uv pip install $(ls -1 dist/*.whl)
      - name: Install pytest
        run: uv pip install pytest pytest-cov
      - name: Generate test signal
        run: python benchmarks/generate_time_signal.py
      - name: Run benchmarks
        run: pytest --no-cov -rP benchmarks
